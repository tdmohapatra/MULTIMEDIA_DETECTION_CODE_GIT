name: CI Quality Gates

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-smoke:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore solution
        run: dotnet restore "TDM_MULTIMEDIA DOTNET CORE/ImgToText.sln"

      - name: Build API
        run: dotnet build "TDM_MULTIMEDIA DOTNET CORE/ImgToText/STAR_MUTIMEDIA.csproj" --configuration Release --no-restore

      - name: Build UI
        run: dotnet build "TDM_MULTIMEDIA DOTNET CORE/ImgToText_UI/ImgToText_UI.csproj" --configuration Release --no-restore

      - name: Start API for smoke checks
        run: |
          $apiProj = "TDM_MULTIMEDIA DOTNET CORE/ImgToText/STAR_MUTIMEDIA.csproj"
          $apiArgs = "run --project `"$apiProj`" --configuration Release --no-build --urls http://localhost:5078"
          $p = Start-Process -FilePath "dotnet" -ArgumentList $apiArgs -PassThru
          Set-Content -Path "api.pid" -Value $p.Id
          Start-Sleep -Seconds 12

      - name: API smoke endpoints
        run: |
          $health = Invoke-WebRequest -Uri "http://localhost:5078/api/detection/health" -UseBasicParsing -TimeoutSec 20
          if ($health.StatusCode -ne 200) { throw "Health failed: $($health.StatusCode)" }
          $ready = Invoke-WebRequest -Uri "http://localhost:5078/ready" -UseBasicParsing -TimeoutSec 20
          if ($ready.StatusCode -ne 200 -and $ready.StatusCode -ne 503) { throw "Ready failed: $($ready.StatusCode)" }

      - name: Stop API process
        if: always()
        run: |
          if (Test-Path "api.pid") {
            $pid = Get-Content "api.pid"
            if ($pid) {
              Stop-Process -Id $pid -Force -ErrorAction SilentlyContinue
            }
          }
